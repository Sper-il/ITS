<!DOCTYPE html>

<html class="dark" lang="vi"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>ITS Traffic LOS - Chế độ Dẫn đường</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&amp;family=IBM+Plex+Mono:wght@400;500&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Leaflet dark map tiles -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<style>
        :root {
            --maneuver-blue: #1565C0;
            --map-pitch: 45deg;
        }
        body {
            font-family: 'IBM Plex Sans', sans-serif;
            background-color: #051424;
            margin: 0;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-panel {
            background: rgba(11, 18, 32, 0.85);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .map-perspective {
            perspective: 1000px;
            transform-style: preserve-3d;
        }
        .map-surface {
            transform: rotateX(45deg) scale(1.4);
            transition: transform 0.5s ease-out;
        }
        /* Pulse for user location */
        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            70% { transform: scale(2.5); opacity: 0; }
            100% { transform: scale(1); opacity: 0; }
        }
        .user-dot-pulse::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background: #ef4444;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "on-primary-container": "#eeefff",
                      "inverse-primary": "#0053db",
                      "surface-container-low": "#0d1c2d",
                      "primary": "#b4c5ff",
                      "surface-container-high": "#1c2b3c",
                      "outline": "#8d90a0",
                      "primary-container": "#2563eb",
                      "surface-container": "#122131",
                      "background": "#051424",
                      "on-background": "#d4e4fa",
                      "outline-variant": "#434655",
                      "surface-container-lowest": "#010f1f",
              },
              "spacing": {
                      "panel-padding": "20px",
                      "margin-page": "24px",
                      "stack-gap": "8px",
                      "unit": "4px",
              },
              "fontFamily": {
                      "body-sm": ["IBM Plex Sans"],
                      "mono-data": ["IBM Plex Mono"],
                      "headline-sm": ["IBM Plex Sans"],
                      "headline-md": ["IBM Plex Sans"]
              }
            }
          }
        }
    </script>
</head>
<body class="text-on-background">
<!-- ZONE 2: 2D MAP BACKGROUND -->
<div class="fixed inset-0 w-full h-full z-0 bg-[#0b1220] overflow-hidden">
<div class="w-full h-full relative" id="map-container">
    <div id="map" class="absolute inset-0 w-full h-full"></div>
</div>
<!-- Depth Overlay -->
<div class="absolute inset-0 bg-gradient-to-t from-background via-transparent to-transparent opacity-40 pointer-events-none"></div>
</div>
<!-- ZONE 1: TOP GUIDANCE BANNER -->
<header class="fixed top-0 left-0 right-0 z-50 p-6 flex justify-center">
<div class="w-full max-w-4xl bg-[#1565C0] rounded-2xl shadow-2xl overflow-hidden flex items-stretch border border-white/10" id="nav-banner">
<div class="bg-black/10 px-8 flex items-center justify-center">
<span id="nav-icon" class="material-symbols-outlined text-white text-5xl">turn_slight_right</span>
</div>
<div class="flex-1 p-5">
<h1 id="nav-maneuver" class="text-white font-headline-md text-[28px] font-bold leading-tight tracking-tight">Đang tải lộ trình...</h1>
<div class="flex items-center gap-4 mt-1 opacity-90">
<span id="nav-dist-next" class="text-white font-mono-data text-lg">...</span>
<div class="w-1.5 h-1.5 rounded-full bg-white/40"></div>
<span id="nav-clock" class="text-white font-mono-data text-lg">--:--</span>
</div>
</div>
<div class="flex flex-col border-l border-white/10">
<button class="flex-1 px-6 hover:bg-white/5 transition-colors flex items-center justify-center">
<span class="material-symbols-outlined text-white">volume_up</span>
</button>
<button class="flex-1 px-6 border-t border-white/10 hover:bg-white/5 transition-colors flex items-center justify-center">
<span class="material-symbols-outlined text-white">search</span>
</button>
</div>
</div>
</header>
<!-- RIGHT CONTROLS -->
<div class="fixed right-6 top-1/2 -translate-y-1/2 z-40 flex flex-col gap-4">
<div class="glass-panel p-2 rounded-xl flex flex-col gap-2">
<button id="zoomInBtn" class="w-14 h-14 rounded-lg bg-surface-container-high hover:bg-primary/20 transition-all flex items-center justify-center group" title="Phóng to">
<span class="material-symbols-outlined group-active:scale-90 transition-transform">add</span>
</button>
<button id="zoomOutBtn" class="w-14 h-14 rounded-lg bg-surface-container-high hover:bg-primary/20 transition-all flex items-center justify-center group" title="Thu nhỏ">
<span class="material-symbols-outlined group-active:scale-90 transition-transform">remove</span>
</button>
</div>
<button class="w-14 h-14 rounded-xl glass-panel text-primary hover:bg-primary/10 transition-all flex items-center justify-center group shadow-xl" id="recenterBtn">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">my_location</span>
</button>
<button class="w-14 h-14 rounded-xl glass-panel text-white hover:bg-surface-variant transition-all flex items-center justify-center group shadow-xl" id="compassBtn" title="Chuyển đổi hướng nhìn">
<span class="material-symbols-outlined transition-transform duration-300" id="compassIcon">explore</span>
</button>
</div>
<!-- LEFT TOGGLE -->
<div class="fixed left-6 top-1/2 -translate-y-1/2 z-40">
<div class="glass-panel p-4 rounded-2xl flex flex-col gap-6 items-center">
<div class="flex flex-col items-center gap-2">
<label class="relative inline-flex items-center cursor-pointer">
<input id="auto-next-toggle" checked="" class="sr-only peer" type="checkbox"/>
<div class="w-11 h-6 bg-surface-variant peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full rtl:peer-checked:after:-translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:start-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-primary"></div>
</label>
<span class="text-[10px] font-bold text-on-surface-variant uppercase tracking-wider text-center leading-none">Định vị<br/>GPS</span>
</div>
<div class="h-px w-full bg-outline-variant/20"></div>
<div class="flex flex-col items-center gap-4">
<button class="w-12 h-12 rounded-full border border-outline-variant/30 flex items-center justify-center hover:bg-white/5">
<span class="material-symbols-outlined text-outline">report_problem</span>
</button>
<button class="w-12 h-12 rounded-full border border-outline-variant/30 flex items-center justify-center hover:bg-white/5">
<span class="material-symbols-outlined text-outline">alternate_email</span>
</button>
</div>
</div>
</div>

<!-- SPEEDOMETER -->
<div class="fixed bottom-32 left-6 z-40">
    <div id="speedometer" class="glass-panel w-20 h-20 rounded-full flex flex-col items-center justify-center border-4 border-outline-variant/30 shadow-[0_0_20px_rgba(0,0,0,0.5)] transition-colors duration-300">
        <span id="nav-speed" class="font-mono-data text-2xl font-bold text-white leading-none">0</span>
        <span class="text-[10px] font-bold text-outline uppercase tracking-wider mt-1">km/h</span>
    </div>
</div>

<!-- ZONE 3: BOTTOM STATUS BAR -->
<footer class="fixed bottom-0 left-0 right-0 z-50 p-6 flex flex-col items-center gap-4">
<div class="w-full max-w-6xl flex items-end justify-between gap-6">
<!-- Exit Button -->
<button id="exit-btn" class="bg-error-container text-on-error-container px-8 py-4 rounded-2xl font-bold flex items-center gap-3 shadow-2xl hover:scale-105 active:scale-95 transition-all">
<span class="material-symbols-outlined">close</span>
                THOÁT
            </button>
<!-- Metrics Panel -->
<div class="flex-1 glass-panel rounded-2xl p-6 grid grid-cols-4 gap-8 shadow-2xl">
<div class="flex flex-col border-r border-outline-variant/20">
<span class="text-section-label font-section-label text-outline uppercase tracking-[0.1em]">CÒN LẠI</span>
<div class="flex items-baseline gap-1 mt-1">
<span id="nav-dist-rem" class="text-3xl font-bold font-mono-data">--</span>
<span id="nav-dist-unit" class="text-sm font-medium text-outline">km</span>
</div>
</div>
<div class="flex flex-col border-r border-outline-variant/20">
<span class="text-section-label font-section-label text-outline uppercase tracking-[0.1em]">ETA</span>
<div class="flex items-baseline gap-1 mt-1">
<span id="nav-eta" class="text-3xl font-bold font-mono-data text-primary">--</span>
<span id="nav-eta-unit" class="text-sm font-medium text-outline">min</span>
</div>
</div>
<div class="flex flex-col border-r border-outline-variant/20">
<span class="text-section-label font-section-label text-outline uppercase tracking-[0.1em]">HOÀN THÀNH</span>
<div class="flex items-center gap-3 mt-1">
<span id="nav-comp-text" class="text-3xl font-bold font-mono-data">0%</span>
<div class="flex-1 h-2 bg-surface-variant rounded-full overflow-hidden mr-4">
<div id="nav-comp-bar" class="h-full bg-primary rounded-full" style="width: 0%"></div>
</div>
</div>
</div>
<div class="flex flex-col">
<span class="text-section-label font-section-label text-outline uppercase tracking-[0.1em]">TÍN HIỆU GPS</span>
<div class="flex items-center gap-2 mt-1">
<div class="flex gap-0.5">
<div class="w-1.5 h-3 bg-primary rounded-sm"></div>
<div class="w-1.5 h-4 bg-primary rounded-sm"></div>
<div class="w-1.5 h-5 bg-primary rounded-sm"></div>
<div class="w-1.5 h-6 bg-primary rounded-sm opacity-30"></div>
</div>
<span class="text-lg font-bold font-mono-data">±15m</span>
</div>
</div>
</div>
<!-- Alternative Routes / Settings -->
<button class="bg-primary text-on-primary px-8 py-4 rounded-2xl font-bold flex items-center gap-3 shadow-2xl hover:scale-105 active:scale-95 transition-all">
<span class="material-symbols-outlined">alt_route</span>
                LỘ TRÌNH
            </button>
</div>
</footer>
<!-- INTERACTION SCRIPTS -->
<script src="api.js"></script>
<script src="nav_app.js"></script>
<script>
        // Simple micro-interaction for recenter button
        const recenterBtn = document.getElementById('recenterBtn');
        const mapSurface = document.querySelector('.map-surface');

        recenterBtn.addEventListener('click', () => {
            mapSurface.style.transform = 'rotateX(45deg) scale(1.6) translate(0, 50px)';
            setTimeout(() => {
                mapSurface.style.transform = 'rotateX(45deg) scale(1.4)';
            }, 600);
        });

        // Toggle handling
        const toggles = document.querySelectorAll('input[type="checkbox"]');
        toggles.forEach(t => {
            t.addEventListener('change', (e) => {
                console.log('Auto-next toggled:', e.target.checked);
            });
        });

        // Hover tilt effect for guidance banner
        const banner = document.querySelector('header > div');
        banner.addEventListener('mousemove', (e) => {
            const rect = banner.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            const xc = rect.width / 2;
            const yc = rect.height / 2;
            const dx = x - xc;
            const dy = y - yc;
            banner.style.transform = `perspective(1000px) rotateX(${-dy/40}deg) rotateY(${dx/100}deg) translateZ(10px)`;
        });

        banner.addEventListener('mouseleave', () => {
            banner.style.transform = 'none';
        });
    </script>
</body></html>
